<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ATLAS Admin Dashboard — Feedback analytics and system monitoring.">
    <title>ATLAS Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #f8f7f5;
            color: #2c2c2c;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e0ddd5;
            padding: 24px 0;
            margin-bottom: 40px;
        }

        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #CC0000;
        }

        .header-subtitle {
            font-size: 14px;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-links {
            display: flex;
            gap: 16px;
        }

        .nav-links a {
            font-size: 13px;
            color: #6b6b6b;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            background: #f0f0f0;
        }

        /* Access denied */
        .access-denied {
            background: #ffffff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-top: 60px;
        }

        .access-denied-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .access-denied-message {
            font-size: 18px;
            font-weight: 600;
            color: #2c2c2c;
            margin-bottom: 8px;
        }

        .access-denied-description {
            font-size: 14px;
            color: #6b6b6b;
        }

        /* Summary cards */
        .summary-section {
            margin-bottom: 40px;
        }

        .summary-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .summary-card {
            background: #ffffff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .summary-card-label {
            font-size: 12px;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .summary-card-value {
            font-size: 36px;
            font-weight: 700;
            color: #CC0000;
        }

        .summary-card-detail {
            font-size: 12px;
            color: #6b6b6b;
            margin-top: 8px;
        }

        /* Tables */
        .table-section {
            background: #ffffff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e0ddd5;
            background: #f8f7f5;
        }

        .table-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c2c2c;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #ffffff;
            padding: 12px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid #e0ddd5;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #f8f7f5;
        }

        .table-cell-code {
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            color: #CC0000;
            font-size: 12px;
        }

        .table-cell-percent {
            font-weight: 600;
            color: #4caf50;
        }

        .table-cell-percent.low {
            color: #ff9800;
        }

        .rating-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .rating-badge.positive {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .rating-badge.negative {
            background: #ffebee;
            color: #c62828;
        }

        .feedback-snippet {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #6b6b6b;
        }

        .feedback-comment {
            font-size: 12px;
            color: #6b6b6b;
            margin-top: 4px;
            font-style: italic;
        }

        .feedback-timestamp {
            font-size: 11px;
            color: #6b6b6b;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b6b6b;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e0ddd5;
            border-top-color: #CC0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error state */
        .error-message {
            background: #ffebee;
            border: 1px solid #ef5350;
            color: #c62828;
            padding: 16px;
            border-radius: 6px;
            margin: 20px 0;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b6b6b;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: #ffffff;
            padding: 40px 0;
            margin-top: 60px;
            text-align: center;
            font-size: 13px;
        }

        footer a {
            color: #CC0000;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            table {
                font-size: 12px;
            }

            th,
            td {
                padding: 8px 12px;
            }

            .feedback-snippet {
                max-width: 150px;
            }
        }

        @media (max-width: 480px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }

            .table-section {
                overflow-x: auto;
            }

            table {
                min-width: 500px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div>
                <div class="logo">ATLAS Admin</div>
                <div class="header-subtitle">Adaptive Teaching &amp; Learning Assistant System</div>
            </div>
            <div class="nav-links">
                <a href="/">Courses</a>
                <a id="upload-link" href="/admin/upload">Materials</a>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="container">
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading dashboard...
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        ATLAS Lab &middot; Northeastern University &middot; <a href="mailto:b.claster@northeastern.edu">Prof. Bill Claster</a>
    </footer>

    <script>
        function getAdminKey() {
            var params = new URLSearchParams(window.location.search);
            return params.get('key');
        }

        function showAccessDenied() {
            document.getElementById('content').innerHTML =
                '<div class="access-denied">' +
                '<div class="access-denied-icon">&#128274;</div>' +
                '<div class="access-denied-message">Access Denied</div>' +
                '<div class="access-denied-description">Admin key required to view this dashboard.</div>' +
                '</div>';
        }

        async function loadDashboard() {
            var key = getAdminKey();

            if (!key || key !== 'atlas2026') {
                showAccessDenied();
                return;
            }

            try {
                var response = await fetch('/api/admin/stats?key=atlas2026');
                if (!response.ok) throw new Error('Failed to load stats');
                var stats = await response.json();
                renderDashboard(stats);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('content').innerHTML =
                    '<div class="error-message">Error loading dashboard: ' + escapeHtml(error.message) + '. Please try again.</div>';
            }
        }

        function renderDashboard(stats) {
            var approvalRate = stats.total_feedback > 0
                ? Math.round((stats.approval_count / stats.total_feedback) * 100)
                : 0;

            var html = '';

            // Summary Cards
            html += '<section class="summary-section">';
            html += '<h2 class="summary-section-title">System Overview</h2>';
            html += '<div class="summary-cards">';
            html += '<div class="summary-card"><div class="summary-card-label">Total Sessions</div><div class="summary-card-value">' + stats.total_sessions + '</div></div>';
            html += '<div class="summary-card"><div class="summary-card-label">Total Feedback</div><div class="summary-card-value">' + stats.total_feedback + '</div></div>';
            html += '<div class="summary-card"><div class="summary-card-label">Approval Rate</div><div class="summary-card-value">' + approvalRate + '%</div><div class="summary-card-detail">' + stats.approval_count + ' of ' + stats.total_feedback + '</div></div>';
            html += '<div class="summary-card"><div class="summary-card-label">Active Courses</div><div class="summary-card-value">' + stats.active_courses + '</div></div>';
            html += '</div></section>';

            // Per-course breakdown table
            html += '<section class="table-section"><div class="table-header"><p class="table-title">Per-Course Breakdown</p></div>';
            html += '<table><thead><tr><th>Course Code</th><th>Course Name</th><th>Feedback</th><th>Approval Rate</th><th>Unique Sessions</th></tr></thead><tbody>';

            if (stats.courses && stats.courses.length > 0) {
                stats.courses.forEach(function(course) {
                    var courseApprovalRate = course.feedback_count > 0
                        ? Math.round((course.approval_count / course.feedback_count) * 100)
                        : 0;
                    var rateClass = courseApprovalRate >= 75 ? '' : 'low';
                    html += '<tr>';
                    html += '<td class="table-cell-code">' + escapeHtml(course.code) + '</td>';
                    html += '<td>' + escapeHtml(course.name) + '</td>';
                    html += '<td>' + course.feedback_count + '</td>';
                    html += '<td><span class="table-cell-percent ' + rateClass + '">' + courseApprovalRate + '%</span></td>';
                    html += '<td>' + course.session_count + '</td>';
                    html += '</tr>';
                });
            } else {
                html += '<tr><td colspan="5" style="text-align: center; padding: 40px;">No course data available</td></tr>';
            }

            html += '</tbody></table></section>';

            // Recent feedback table
            html += '<section class="table-section"><div class="table-header"><p class="table-title">Recent Feedback (Last 20)</p></div>';
            html += '<table><thead><tr><th>Timestamp</th><th>Course</th><th>Rating</th><th>Message</th><th>Comment</th></tr></thead><tbody>';

            if (stats.recent_feedback && stats.recent_feedback.length > 0) {
                stats.recent_feedback.forEach(function(fb) {
                    var rating = fb.rating === 1 ? 'Positive' : 'Negative';
                    var ratingClass = fb.rating === 1 ? 'positive' : 'negative';
                    var timestamp = new Date(fb.timestamp).toLocaleString();
                    var messageSnippet = fb.user_message.substring(0, 50) + (fb.user_message.length > 50 ? '...' : '');
                    var comment = fb.comment || '\u2014';
                    html += '<tr>';
                    html += '<td class="feedback-timestamp">' + escapeHtml(timestamp) + '</td>';
                    html += '<td class="table-cell-code">' + escapeHtml(fb.course_id) + '</td>';
                    html += '<td><span class="rating-badge ' + ratingClass + '">' + rating + '</span></td>';
                    html += '<td><span class="feedback-snippet">' + escapeHtml(messageSnippet) + '</span></td>';
                    html += '<td><span class="feedback-comment">' + escapeHtml(comment) + '</span></td>';
                    html += '</tr>';
                });
            } else {
                html += '<tr><td colspan="5" style="text-align: center; padding: 40px;">No feedback data available</td></tr>';
            }

            html += '</tbody></table></section>';

            document.getElementById('content').innerHTML = html;
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            var div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', function() {
            try {
                var key = new URLSearchParams(window.location.search).get('key') || '';
                var uploadLink = document.getElementById('upload-link');
                if (uploadLink) {
                    uploadLink.href = '/admin/upload?key=' + key;
                }
            } catch (e) {
                console.warn('Could not set upload link:', e);
            }
            loadDashboard();
        });
    </script>
</body>
</html>
