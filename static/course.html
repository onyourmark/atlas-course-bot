<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ATLAS Course Assistant — AI teaching assistant for course-specific learning.">
    <title>ATLAS — Course Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #f8f7f5;
            color: #2c2c2c;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .app-layout { display: flex; height: 100vh; flex-direction: row; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e0ddd5;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e0ddd5;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 600;
            color: #2c2c2c;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0ddd5;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.3s ease;
        }

        .progress-text { font-size: 11px; color: #6b6b6b; }

        .concepts-list { flex: 1; overflow-y: auto; padding: 8px 0; }

        .concept-item {
            padding: 12px 16px;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .concept-item:hover {
            background: #f8f7f5;
            border-left-color: #CC0000;
        }

        .concept-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 4px;
            background: #ccc;
            transition: background 0.2s ease;
        }

        .concept-dot.covered { background: #4a90d9; }
        .concept-dot.explored { background: #4caf50; }

        .concept-text { flex: 1; min-width: 0; }

        .concept-name {
            font-size: 13px;
            font-weight: 500;
            color: #2c2c2c;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .concept-lectures {
            font-size: 10px;
            color: #6b6b6b;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #e0ddd5;
            font-size: 11px;
            color: #6b6b6b;
            flex-shrink: 0;
        }

        /* Main content area */
        .main-content { flex: 1; display: flex; flex-direction: column; }

        /* Header */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e0ddd5;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 20px;
        }

        .header-left { font-size: 20px; font-weight: 700; color: #CC0000; }
        .header-center { flex: 1; text-align: center; min-width: 0; }

        .header-course-code {
            font-size: 12px;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .header-course-name {
            font-size: 15px;
            font-weight: 600;
            color: #2c2c2c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

        .header-link {
            font-size: 13px;
            color: #CC0000;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .header-link:hover { color: #aa0000; }

        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #CC0000;
            font-size: 20px;
        }

        /* Chat area */
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message { display: flex; gap: 12px; animation: slideIn 0.3s ease; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            background: #ffffff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 12px 16px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: #CC0000;
            color: #ffffff;
            border-color: #CC0000;
        }

        /* Markdown styles for assistant messages */
        .message-content h3 {
            font-size: 15px;
            font-weight: 700;
            color: #2c2c2c;
            margin: 16px 0 8px 0;
        }

        .message-content h4 {
            font-size: 14px;
            font-weight: 600;
            color: #2c2c2c;
            margin: 12px 0 6px 0;
        }

        .message-content strong { font-weight: 600; }
        .message-content em { font-style: italic; }

        .message-content hr {
            border: none;
            border-top: 1px solid #e0ddd5;
            margin: 16px 0;
        }

        .message-content ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content li { margin: 4px 0; }

        .message-content blockquote {
            border-left: 3px solid #CC0000;
            padding-left: 12px;
            margin: 8px 0;
            color: #555;
            font-style: italic;
        }

        .message-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 12px;
        }

        .message-content pre {
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .message-content p { margin: 8px 0; }
        .message-content p:first-child { margin-top: 0; }
        .message-content p:last-child { margin-bottom: 0; }

        /* Override markdown styles inside user messages (keep white text) */
        .message.user .message-content h3,
        .message.user .message-content h4,
        .message.user .message-content strong,
        .message.user .message-content em,
        .message.user .message-content p,
        .message.user .message-content li,
        .message.user .message-content blockquote {
            color: #ffffff;
        }

        .message-bubble { display: flex; flex-direction: column; }

        .feedback-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-start;
            font-size: 16px;
        }

        .feedback-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        .feedback-btn:hover { opacity: 1; }

        .feedback-text { font-size: 12px; color: #6b6b6b; margin-top: 8px; }

        .feedback-input-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .feedback-input {
            font-size: 13px;
            padding: 8px 12px;
            border: 1px solid #e0ddd5;
            border-radius: 6px;
            font-family: inherit;
            resize: none;
            max-width: 300px;
        }

        .understand-button {
            font-size: 12px;
            background: #4caf50;
            color: #ffffff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s ease;
        }

        .understand-button:hover { background: #45a049; }

        .mode-toggle-button {
            font-size: 12px;
            background: #f8f7f5;
            color: #CC0000;
            border: 1px solid #CC0000;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .mode-toggle-button:hover:not(:disabled) {
            background: #CC0000;
            color: #ffffff;
        }

        .mode-toggle-button:disabled {
            cursor: default;
            border-color: #4caf50;
            color: #4caf50;
        }

        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #e0ddd5;
            flex-shrink: 0;
        }

        .input-container { display: flex; gap: 12px; }

        .input-textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 120px;
            min-height: 44px;
        }

        .input-textarea:focus {
            outline: none;
            border-color: #CC0000;
            box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.1);
        }

        .input-textarea::placeholder { color: #6b6b6b; }

        .send-button {
            background: #CC0000;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
            transition: all 0.2s ease;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button:hover:not(:disabled) { background: #aa0000; }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Welcome message */
        .welcome-message {
            text-align: center;
            color: #6b6b6b;
            padding: 40px 20px;
        }

        .welcome-icon { font-size: 48px; margin-bottom: 16px; }

        .welcome-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c2c2c;
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                position: absolute;
                left: 0; top: 0;
                height: 100%;
                z-index: 100;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
                display: none;
            }
            .sidebar.open { display: flex; }
            .sidebar-toggle { display: block; }
            .message-content { max-width: 85%; }
        }

        @media (max-width: 600px) {
            header { flex-wrap: wrap; gap: 8px; }
            .header-center { flex-basis: 100%; order: 3; }
            .header-right { flex-basis: 100%; order: 2; }
            .message-content { max-width: 95%; }
            .messages { padding: 16px; }
            .input-area { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Course Concept Map</div>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <div class="progress-text"><span id="progress-count">0</span> of <span id="progress-total">0</span> concepts explored</div>
            </div>
            <div class="concepts-list" id="concepts-list"></div>
            <div class="sidebar-footer" id="sidebar-footer">
                Loading concepts...
            </div>
        </aside>

        <!-- Main content -->
        <div class="main-content">
            <!-- Header -->
            <header>
                <div class="header-left">ATLAS <span style="font-size: 10px; font-weight: 400; color: #999; margin-left: 4px;">Adaptive Teaching &amp; Learning Assistant System</span></div>
                <div class="header-center">
                    <div class="header-course-code" id="header-code">Loading...</div>
                    <div class="header-course-name" id="header-name">Loading...</div>
                </div>
                <div class="header-right">
                    <a href="/about" class="header-link">About</a>
                    <button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>
                </div>
            </header>

            <!-- Chat -->
            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="welcome-message">
                        <div class="welcome-icon">&#128218;</div>
                        <div class="welcome-title" id="welcome-title">Welcome!</div>
                        <p id="welcome-text">Ask me anything about this course. I'm familiar with all the lecture content and can help you understand key concepts.</p>
                    </div>
                </div>

                <!-- Input area -->
                <div class="input-area">
                    <div class="input-container">
                        <textarea class="input-textarea" id="input-textarea" placeholder="Ask about this course..." rows="1"></textarea>
                        <button class="send-button" id="send-button">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            var html = escapeHtml(text);
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p><hr><\/p>/g, '<hr>');
            html = html.replace(/<p><h([34])>/g, '<h$1>');
            html = html.replace(/<\/h([34])><\/p>/g, '</h$1>');
            html = html.replace(/<p><ul>/g, '<ul>');
            html = html.replace(/<\/ul><\/p>/g, '</ul>');
            html = html.replace(/<p><blockquote>/g, '<blockquote>');
            html = html.replace(/<\/blockquote><\/p>/g, '</blockquote>');
            html = html.replace(/<p><pre>/g, '<pre>');
            html = html.replace(/<\/pre><\/p>/g, '</pre>');
            return html;
        }

        var courseId = window.location.pathname.split('/').pop();
        var sessionId;
        var currentCourse = null;
        var conceptMap = null;
        var messageHistory = [];
        var answerMode = 'socratic';
        var firstAssistantMessage = true;

        function initSession() {
            if (!sessionStorage.getItem('atlas_session_id')) {
                sessionId = generateUUID();
                sessionStorage.setItem('atlas_session_id', sessionId);
            } else {
                sessionId = sessionStorage.getItem('atlas_session_id');
            }
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0;
                var v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        async function loadCourse() {
            try {
                var response = await fetch('/courses');
                var data = await response.json();
                var courses = data.courses || data;
                currentCourse = courses.find(function(c) { return c.id === courseId; });
                if (currentCourse) {
                    document.getElementById('header-code').textContent = currentCourse.code;
                    document.getElementById('header-name').textContent = currentCourse.name;
                    document.getElementById('welcome-title').textContent = 'Welcome to ' + currentCourse.code;
                    document.getElementById('input-textarea').placeholder = 'Ask about ' + currentCourse.code + '...';
                }
            } catch (error) {
                console.error('Error loading course:', error);
            }
        }

        async function loadConceptMap() {
            try {
                var response = await fetch('/course/' + courseId + '/concept-map');
                conceptMap = await response.json();
                renderConceptMap();
            } catch (error) {
                console.error('Error loading concept map:', error);
                document.getElementById('sidebar-footer').textContent = 'Error loading concepts';
            }
        }

        function renderConceptMap() {
            var list = document.getElementById('concepts-list');
            list.innerHTML = '';
            if (!conceptMap || !conceptMap.concepts || conceptMap.concepts.length === 0) return;

            var explored = JSON.parse(localStorage.getItem('atlas_progress_' + courseId) || '{}');
            var exploredCount = 0;

            conceptMap.concepts.forEach(function(concept) {
                var isExplored = explored[concept.id];
                if (isExplored) exploredCount++;

                var item = document.createElement('div');
                item.className = 'concept-item';
                item.title = concept.description || '';

                var dot = document.createElement('div');
                dot.className = 'concept-dot';
                if (isExplored) { dot.classList.add('explored'); }
                else if (concept.lectures && concept.lectures.length > 0) { dot.classList.add('covered'); }

                var text = document.createElement('div');
                text.className = 'concept-text';

                var name = document.createElement('div');
                name.className = 'concept-name';
                name.textContent = concept.name;

                var lectures = document.createElement('div');
                lectures.className = 'concept-lectures';
                lectures.textContent = concept.lectures ? 'L' + concept.lectures.join(', L') : '';

                text.appendChild(name);
                if (lectures.textContent) text.appendChild(lectures);
                item.appendChild(dot);
                item.appendChild(text);

                item.addEventListener('click', function() {
                    sendMessage('Tell me about ' + concept.name + ' and what I need to know before studying it.');
                });

                list.appendChild(item);
            });

            document.getElementById('progress-count').textContent = exploredCount;
            document.getElementById('progress-total').textContent = conceptMap.concepts.length;
            var percent = conceptMap.concepts.length > 0 ? (exploredCount / conceptMap.concepts.length) * 100 : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        async function sendMessage(text) {
            if (!text.trim()) return;
            document.getElementById('input-textarea').value = '';
            addMessage('user', text);
            var typingId = addTypingIndicator();

            try {
                var response = await fetch('/course/' + courseId + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        course_id: courseId,
                        session_id: sessionId,
                        message: answerMode === 'socratic' ? '[SOCRATIC MODE] ' + text : text,
                        history: messageHistory
                    })
                });

                if (!response.ok) throw new Error('Chat error');
                var data = await response.json();
                removeTypingIndicator(typingId);
                addMessage('assistant', data.response);
                messageHistory.push({ role: 'user', content: text });
                messageHistory.push({ role: 'assistant', content: data.response });
            } catch (error) {
                console.error('Error sending message:', error);
                removeTypingIndicator(typingId);
                addMessage('assistant', 'Sorry, I encountered an error. Please try again.');
            }
        }

        function addMessage(role, content) {
            var messagesDiv = document.getElementById('messages');
            var welcome = messagesDiv.querySelector('.welcome-message');
            if (welcome && role === 'user') welcome.remove();

            var message = document.createElement('div');
            message.className = 'message ' + role;

            var bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            var contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = role === 'user' ? escapeHtml(content) : renderMarkdown(content);

            bubble.appendChild(contentDiv);

            if (role === 'assistant') {
                var feedback = document.createElement('div');
                feedback.className = 'feedback-buttons';

                var thumbsUp = document.createElement('button');
                thumbsUp.className = 'feedback-btn';
                thumbsUp.textContent = '\uD83D\uDC4D';
                thumbsUp.addEventListener('click', function() { submitFeedback(content, 1, feedback); });

                var thumbsDown = document.createElement('button');
                thumbsDown.className = 'feedback-btn';
                thumbsDown.textContent = '\uD83D\uDC4E';
                thumbsDown.addEventListener('click', function() { submitFeedback(content, 0, feedback, true); });

                feedback.appendChild(thumbsUp);
                feedback.appendChild(thumbsDown);
                bubble.appendChild(feedback);

                var understandBtn = document.createElement('button');
                understandBtn.className = 'understand-button';
                understandBtn.textContent = 'Mark as understood \u2713';
                understandBtn.addEventListener('click', function() {
                    markConceptAsUnderstood();
                    understandBtn.remove();
                });
                bubble.appendChild(understandBtn);

                if (firstAssistantMessage && answerMode === 'socratic') {
                    firstAssistantMessage = false;
                    var modeToggle = document.createElement('button');
                    modeToggle.className = 'mode-toggle-button';
                    modeToggle.textContent = 'Give me direct answers instead of food for thought';
                    modeToggle.addEventListener('click', function() {
                        answerMode = 'direct';
                        modeToggle.textContent = 'Direct answers mode \u2713';
                        modeToggle.disabled = true;
                        modeToggle.style.opacity = '0.6';
                    });
                    bubble.appendChild(modeToggle);
                }
            }

            message.appendChild(bubble);
            messagesDiv.appendChild(message);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addTypingIndicator() {
            var messagesDiv = document.getElementById('messages');
            var typing = document.createElement('div');
            typing.className = 'message';
            typing.id = 'typing-' + Date.now();
            typing.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return typing.id;
        }

        function removeTypingIndicator(id) {
            var el = document.getElementById(id);
            if (el) el.remove();
        }

        function submitFeedback(response, rating, container, showInput) {
            fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    course_id: courseId,
                    session_id: sessionId,
                    user_message: messageHistory.length >= 2 ? messageHistory[messageHistory.length - 2].content : '',
                    bot_response: response,
                    rating: rating
                })
            }).catch(function(err) { console.error(err); });

            container.innerHTML = '<div class="feedback-text">Thanks for your feedback!</div>';

            if (showInput) {
                var inputContainer = document.createElement('div');
                inputContainer.className = 'feedback-input-container';
                var textarea = document.createElement('textarea');
                textarea.className = 'feedback-input';
                textarea.placeholder = 'What could be better?';
                textarea.rows = 2;
                inputContainer.appendChild(textarea);
                container.parentElement.appendChild(inputContainer);
            }
        }

        function markConceptAsUnderstood() {
            var explored = JSON.parse(localStorage.getItem('atlas_progress_' + courseId) || '{}');
            if (conceptMap && conceptMap.concepts.length > 0) {
                var concept = conceptMap.concepts[0];
                explored[concept.id] = true;
                localStorage.setItem('atlas_progress_' + courseId, JSON.stringify(explored));
                renderConceptMap();
            }
        }

        document.getElementById('send-button').addEventListener('click', function() {
            sendMessage(document.getElementById('input-textarea').value);
        });

        document.getElementById('input-textarea').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(e.target.value);
            }
        });

        document.getElementById('input-textarea').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        document.getElementById('sidebar-toggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            var sidebar = document.getElementById('sidebar');
            var toggle = document.getElementById('sidebar-toggle');
            if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        initSession();
        loadCourse();
        loadConceptMap();
    </script>
</body>
</html>
