<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ATLAS Course Assistant — AI teaching assistant for course-specific learning.">
    <title>ATLAS — Course Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #f8f7f5;
            color: #2c2c2c;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .app-layout {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e0ddd5;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e0ddd5;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 600;
            color: #2c2c2c;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0ddd5;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 11px;
            color: #6b6b6b;
        }

        .concepts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .concept-item {
            padding: 12px 16px;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .concept-item:hover {
            background: #f8f7f5;
            border-left-color: #CC0000;
        }

        .concept-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 4px;
            background: #ccc;
            transition: background 0.2s ease;
        }

        .concept-dot.covered {
            background: #4a90d9;
        }

        .concept-dot.explored {
            background: #4caf50;
        }

        .concept-text {
            flex: 1;
            min-width: 0;
        }

        .concept-name {
            font-size: 13px;
            font-weight: 500;
            color: #2c2c2c;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .concept-lectures {
            font-size: 10px;
            color: #6b6b6b;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .concept-item[title] {
            position: relative;
        }

        .concept-item:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 16px;
            background: #1a1a1a;
            color: #ffffff;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: normal;
            z-index: 10;
            width: 200px;
            margin-bottom: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #e0ddd5;
            font-size: 11px;
            color: #6b6b6b;
            flex-shrink: 0;
        }

        /* Main content area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e0ddd5;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 20px;
        }

        .header-left {
            font-size: 20px;
            font-weight: 700;
            color: #CC0000;
        }

        .header-center {
            flex: 1;
            text-align: center;
            min-width: 0;
        }

        .header-course-code {
            font-size: 12px;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .header-course-name {
            font-size: 15px;
            font-weight: 600;
            color: #2c2c2c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-link {
            font-size: 13px;
            color: #CC0000;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .header-link:hover {
            color: #aa0000;
        }

        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #CC0000;
            font-size: 20px;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-role {
            font-size: 11px;
            font-weight: 600;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .message-content {
            background: #ffffff;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 12px 16px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #CC0000;
            color: #ffffff;
            border-color: #CC0000;
        }

        .message-bubble {
            display: flex;
            flex-direction: column;
        }

        .feedback-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-start;
            font-size: 16px;
        }

        .message.user .feedback-buttons {
            justify-content: flex-end;
        }

        .feedback-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        .feedback-btn:hover {
            opacity: 1;
        }

        .feedback-text {
            font-size: 12px;
            color: #6b6b6b;
            margin-top: 8px;
        }

        .feedback-input-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .feedback-input {
            font-size: 13px;
            padding: 8px 12px;
            border: 1px solid #e0ddd5;
            border-radius: 6px;
            font-family: inherit;
            resize: none;
            max-width: 300px;
        }

        .understand-button {
            font-size: 12px;
            background: #4caf50;
            color: #ffffff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s ease;
        }

        .understand-button:hover {
            background: #45a049;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #e0ddd5;
            flex-shrink: 0;
        }

        .input-container {
            display: flex;
            gap: 12px;
        }

        .input-textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 120px;
            min-height: 44px;
        }

        .input-textarea:focus {
            outline: none;
            border-color: #CC0000;
            box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.1);
        }

        .input-textarea::placeholder {
            color: #6b6b6b;
        }

        .send-button {
            background: #CC0000;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
            transition: all 0.2s ease;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button:hover:not(:disabled) {
            background: #aa0000;
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Welcome message */
        .welcome-message {
            text-align: center;
            color: #6b6b6b;
            padding: 40px 20px;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c2c2c;
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 100;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
                display: none;
            }

            .sidebar.open {
                display: flex;
            }

            .sidebar-toggle {
                display: block;
            }

            .message-content {
                max-width: 85%;
            }
        }

        @media (max-width: 600px) {
            header {
                flex-wrap: wrap;
                gap: 8px;
            }

            .header-center {
                flex-basis: 100%;
                order: 3;
            }

            .header-right {
                flex-basis: 100%;
                order: 2;
            }

            .message-content {
                max-width: 95%;
            }

            .messages {
                padding: 16px;
            }

            .input-area {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Course Concept Map</div>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <div class="progress-text"><span id="progress-count">0</span> of <span id="progress-total">0</span> concepts explored</div>
            </div>
            <div class="concepts-list" id="concepts-list"></div>
            <div class="sidebar-footer" id="sidebar-footer">
                Loading concepts...
            </div>
        </aside>

        <!-- Main content -->
        <div class="main-content">
            <!-- Header -->
            <header>
                <div class="header-left">ATLAS <span style="font-size: 10px; font-weight: 400; color: #999; margin-left: 4px;">Adaptive Teaching &amp; Learning Assistant System</span></div>
                <div class="header-center">
                    <div class="header-course-code" id="header-code">Loading...</div>
                    <div class="header-course-name" id="header-name">Loading...</div>
                </div>
                <div class="header-right">
                    <a href="/about" class="header-link">About</a>
                    <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
                </div>
            </header>

            <!-- Chat -->
            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="welcome-message">
                        <div class="welcome-icon">📚</div>
                        <div class="welcome-title" id="welcome-title">Welcome!</div>
                        <p id="welcome-text">Ask me anything about this course. I'm familiar with all the lecture content and can help you understand key concepts.</p>
                    </div>
                </div>

                <!-- Input area -->
                <div class="input-area">
                    <div class="input-container">
                        <textarea class="input-textarea" id="input-textarea" placeholder="Ask about this course..." rows="1"></textarea>
                        <button class="send-button" id="send-button">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Extract course ID from URL
        const courseId = window.location.pathname.split('/').pop();
        let sessionId;
        let currentCourse = null;
        let conceptMap = null;
        let messageHistory = [];

        // Initialize session
        function initSession() {
            if (!sessionStorage.getItem('atlas_session_id')) {
                sessionId = generateUUID();
                sessionStorage.setItem('atlas_session_id', sessionId);
            } else {
                sessionId = sessionStorage.getItem('atlas_session_id');
            }
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Load course info
        async function loadCourse() {
            try {
                const response = await fetch('/courses');
                const courses = await response.json();
                currentCourse = courses.find(c => c.id === courseId);

                if (currentCourse) {
                    document.getElementById('header-code').textContent = currentCourse.code;
                    document.getElementById('header-name').textContent = currentCourse.name;
                    document.getElementById('welcome-title').textContent = `Welcome to ${currentCourse.code}`;
                    document.getElementById('input-textarea').placeholder = `Ask about ${currentCourse.code}...`;
                }
            } catch (error) {
                console.error('Error loading course:', error);
            }
        }

        // Load concept map
        async function loadConceptMap() {
            try {
                const response = await fetch(`/course/${courseId}/concept-map`);
                conceptMap = await response.json();
                renderConceptMap();
            } catch (error) {
                console.error('Error loading concept map:', error);
                document.getElementById('sidebar-footer').textContent = 'Error loading concepts';
            }
        }

        function renderConceptMap() {
            const list = document.getElementById('concepts-list');
            list.innerHTML = '';

            if (!conceptMap || !conceptMap.concepts || conceptMap.concepts.length === 0) {
                return;
            }

            const explored = JSON.parse(localStorage.getItem(`atlas_progress_${courseId}`) || '{}');
            let exploredCount = 0;

            conceptMap.concepts.forEach(concept => {
                const isExplored = explored[concept.id];
                if (isExplored) exploredCount++;

                const item = document.createElement('div');
                item.className = 'concept-item';
                item.title = concept.description || '';

                const dot = document.createElement('div');
                dot.className = 'concept-dot';
                if (isExplored) {
                    dot.classList.add('explored');
                } else if (concept.lectures && concept.lectures.length > 0) {
                    dot.classList.add('covered');
                }

                const text = document.createElement('div');
                text.className = 'concept-text';

                const name = document.createElement('div');
                name.className = 'concept-name';
                name.textContent = concept.name;

                const lectures = document.createElement('div');
                lectures.className = 'concept-lectures';
                lectures.textContent = concept.lectures ? `L${concept.lectures.join(', L')}` : '';

                text.appendChild(name);
                if (lectures.textContent) {
                    text.appendChild(lectures);
                }

                item.appendChild(dot);
                item.appendChild(text);

                item.addEventListener('click', () => {
                    const message = `Tell me about ${concept.name} and what I need to know before studying it.`;
                    sendMessage(message);
                });

                list.appendChild(item);
            });

            document.getElementById('progress-count').textContent = exploredCount;
            document.getElementById('progress-total').textContent = conceptMap.concepts.length;
            const percent = conceptMap.concepts.length > 0 ? (exploredCount / conceptMap.concepts.length) * 100 : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        // Chat functions
        async function sendMessage(text) {
            if (!text.trim()) return;

            const textarea = document.getElementById('input-textarea');
            textarea.value = '';

            // Add user message
            addMessage('user', text);

            // Show typing indicator
            const typingId = addTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        course_id: courseId,
                        session_id: sessionId,
                        message: text
                    })
                });

                if (!response.ok) throw new Error('Chat error');
                const data = await response.json();

                removeTypingIndicator(typingId);
                addMessage('assistant', data.response);
                messageHistory.push({ role: 'user', content: text });
                messageHistory.push({ role: 'assistant', content: data.response });
            } catch (error) {
                console.error('Error sending message:', error);
                removeTypingIndicator(typingId);
                addMessage('assistant', 'Sorry, I encountered an error. Please try again.');
            }
        }

        function addMessage(role, content) {
            const messagesDiv = document.getElementById('messages');

            // Remove welcome message on first message
            const welcome = messagesDiv.querySelector('.welcome-message');
            if (welcome && role === 'user') {
                welcome.remove();
            }

            const message = document.createElement('div');
            message.className = `message ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            bubble.appendChild(contentDiv);

            // Add feedback for assistant messages
            if (role === 'assistant') {
                const feedback = document.createElement('div');
                feedback.className = 'feedback-buttons';

                const thumbsUp = document.createElement('button');
                thumbsUp.className = 'feedback-btn';
                thumbsUp.textContent = '👍';
                thumbsUp.addEventListener('click', () => submitFeedback(content, 1, feedback));

                const thumbsDown = document.createElement('button');
                thumbsDown.className = 'feedback-btn';
                thumbsDown.textContent = '👎';
                thumbsDown.addEventListener('click', () => {
                    submitFeedback(content, 0, feedback, true);
                });

                feedback.appendChild(thumbsUp);
                feedback.appendChild(thumbsDown);
                bubble.appendChild(feedback);

                // Add understand button (detect if assistant mentioned concepts)
                const understandBtn = document.createElement('button');
                understandBtn.className = 'understand-button';
                understandBtn.textContent = 'Mark as understood ✓';
                understandBtn.addEventListener('click', () => {
                    markConceptAsUnderstood();
                    understandBtn.remove();
                });
                bubble.appendChild(understandBtn);
            }

            message.appendChild(bubble);
            messagesDiv.appendChild(message);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const typing = document.createElement('div');
            typing.className = 'message';
            typing.id = 'typing-' + Date.now();
            typing.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return typing.id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function submitFeedback(response, rating, container, showInput = false) {
            fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    course_id: courseId,
                    session_id: sessionId,
                    user_message: messageHistory[messageHistory.length - 2]?.content || '',
                    bot_response: response,
                    rating: rating
                })
            }).catch(console.error);

            container.innerHTML = '<div class="feedback-text">Thanks for your feedback!</div>';

            if (showInput) {
                const inputContainer = document.createElement('div');
                inputContainer.className = 'feedback-input-container';
                const textarea = document.createElement('textarea');
                textarea.className = 'feedback-input';
                textarea.placeholder = 'What could be better?';
                textarea.rows = 2;
                inputContainer.appendChild(textarea);
                container.parentElement.appendChild(inputContainer);
            }
        }

        function markConceptAsUnderstood() {
            const explored = JSON.parse(localStorage.getItem(`atlas_progress_${courseId}`) || '{}');
            if (conceptMap && conceptMap.concepts.length > 0) {
                const concept = conceptMap.concepts[0];
                explored[concept.id] = true;
                localStorage.setItem(`atlas_progress_${courseId}`, JSON.stringify(explored));
                renderConceptMap();
            }
        }

        // Input handling
        document.getElementById('send-button').addEventListener('click', () => {
            const text = document.getElementById('input-textarea').value;
            sendMessage(text);
        });

        document.getElementById('input-textarea').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = e.target.value;
                sendMessage(text);
            }
        });

        // Auto-resize textarea
        document.getElementById('input-textarea').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Sidebar toggle
        document.getElementById('sidebar-toggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Close sidebar on concept click (mobile)
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebar-toggle');
            if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        // Initialize
        initSession();
        loadCourse();
        loadConceptMap();
    </script>
</body>
</html>
